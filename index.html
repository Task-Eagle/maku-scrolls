<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Word-Style Editor</title>

<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Calibri, Arial;
    background: #e5e5e5;
    overflow: hidden;
}

/* ===== RIBBON ===== */
.ribbon {
    background: #f3f3f3;
    border-bottom: 1px solid #ccc;
}

.ribbon-tabs {
    display: flex;
    background: #2b579a;
    color: white;
}

.ribbon-tabs button {
    padding: 10px 15px;
    border: none;
    background: transparent;
    color: white;
    cursor: pointer;
}

.ribbon-tabs button.active {
    background: white;
    color: #2b579a;
    font-weight: bold;
}

.ribbon-group {
    display: none;
    padding: 8px;
    gap: 10px;
    align-items: center;
}

.ribbon-group.active {
    display: flex;
}

/* ===== PAGE SYSTEM ===== */
#editor-wrapper {
    height: calc(100vh - 90px);
    overflow-y: auto;
    padding: 30px;
}

.page {
    width: 210mm;
    min-height: 297mm;
    background: white;
    margin: 20px auto;
    padding: 20mm;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
    position: relative;
}

/* ===== COMMENTS ===== */
#comments {
    position: fixed;
    right: 0;
    top: 90px;
    width: 250px;
    height: calc(100vh - 90px);
    background: #fafafa;
    border-left: 1px solid #ccc;
    overflow-y: auto;
    padding: 10px;
}

.comment {
    background: #fff;
    border: 1px solid #ddd;
    margin-bottom: 8px;
    padding: 6px;
    font-size: 12px;
}

/* ===== DRAWING ===== */
#draw-layer {
    position: absolute;
    top: 0;
    left: 0;
    pointer-events: none;
}

/* ===== ZOOM ===== */
#editor-wrapper {
    transform-origin: top center;
}
</style>
</head>

<body>

<!-- RIBBON -->
<div class="ribbon">

    <div class="ribbon-tabs">
        <button class="tab active" data-tab="home">Home</button>
        <button class="tab" data-tab="insert">Insert</button>
        <button class="tab" data-tab="layout">Layout</button>
        <button class="tab" data-tab="draw">Draw</button>
    </div>

    <div class="ribbon-group active" data-group="home">
        <button onclick="quill.format('bold', true)">B</button>
        <button onclick="quill.format('italic', true)">I</button>
        <button onclick="quill.format('underline', true)">U</button>

        <select onchange="quill.format('align', this.value)">
            <option value="">Left</option>
            <option value="center">Center</option>
            <option value="right">Right</option>
            <option value="justify">Justify</option>
        </select>

        <select onchange="quill.format('font', this.value)">
            <option value="arial">Arial</option>
            <option value="times-new-roman">Times</option>
        </select>
    </div>

    <div class="ribbon-group" data-group="insert">
        <button onclick="insertImage()">Image</button>
        <button onclick="insertTable()">Table</button>
        <button onclick="addComment()">Comment</button>
    </div>

    <div class="ribbon-group" data-group="layout">
        <select onchange="setZoom(this.value)">
            <option value="0.75">75%</option>
            <option value="1" selected>100%</option>
            <option value="1.25">125%</option>
        </select>

        <select onchange="setMargin(this.value)">
            <option value="10mm">Narrow</option>
            <option value="20mm" selected>Normal</option>
            <option value="30mm">Wide</option>
        </select>
    </div>

    <div class="ribbon-group" data-group="draw">
        <button onclick="toggleDraw()">Toggle Draw</button>
        <input type="color" onchange="ctx.strokeStyle=this.value">
        <input type="range" min="1" max="10" onchange="ctx.lineWidth=this.value">
    </div>

</div>

<!-- EDITOR -->
<div id="editor-wrapper">
    <div id="page-container">
        <div class="page">
            <div id="editor"></div>
            <canvas id="draw-layer"></canvas>
        </div>
    </div>
</div>

<!-- COMMENTS -->
<div id="comments"></div>

<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html-docx-js/dist/html-docx.js"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>

<script>
let quill = new Quill('#editor', {
    theme: 'snow'
});

/* ===== TABS ===== */
document.querySelectorAll(".tab").forEach(t => {
    t.onclick = () => {
        document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
        t.classList.add("active");

        document.querySelectorAll(".ribbon-group").forEach(g => g.classList.remove("active"));
        document.querySelector(`[data-group="${t.dataset.tab}"]`).classList.add("active");
    };
});

/* ===== IMAGE ===== */
function insertImage() {
    let url = prompt("Image URL");
    if (url) quill.insertEmbed(quill.getSelection(true).index, 'image', url);
}

/* ===== TABLE ===== */
function insertTable() {
    let html = "<table border='1' style='width:100%;border-collapse:collapse'>";
    for (let i=0;i<3;i++){
        html+="<tr>";
        for (let j=0;j<3;j++){
            html+="<td contenteditable='true' style='padding:5px'></td>";
        }
        html+="</tr>";
    }
    html+="</table><p><br></p>";
    quill.clipboard.dangerouslyPasteHTML(quill.getLength(), html);
}

/* ===== COMMENTS ===== */
let comments = [];

function addComment() {
    let text = prompt("Comment:");
    if (!text) return;

    comments.push(text);
    renderComments();
}

function renderComments() {
    document.getElementById("comments").innerHTML =
        comments.map(c => `<div class='comment'>${c}</div>`).join("");
}

/* ===== ZOOM ===== */
function setZoom(z) {
    document.getElementById("editor-wrapper").style.transform = `scale(${z})`;
}

/* ===== MARGINS ===== */
function setMargin(m) {
    document.querySelector(".page").style.padding = m;
}

/* ===== DRAWING ===== */
let canvas = document.getElementById("draw-layer");
let ctx = canvas.getContext("2d");
let drawing = false;
let drawMode = false;

function resizeCanvas() {
    let rect = document.querySelector(".page").getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = rect.height;
    canvas.style.width = rect.width + "px";
    canvas.style.height = rect.height + "px";
}
resizeCanvas();

window.onresize = resizeCanvas;

function toggleDraw() {
    drawMode = !drawMode;
    canvas.style.pointerEvents = drawMode ? "auto" : "none";
}

canvas.onmousedown = e => {
    if (!drawMode) return;
    drawing = true;
    ctx.beginPath();
    ctx.moveTo(e.offsetX, e.offsetY);
};

canvas.onmousemove = e => {
    if (!drawing || !drawMode) return;
    ctx.lineTo(e.offsetX, e.offsetY);
    ctx.stroke();
};

canvas.onmouseup = () => drawing = false;

/* ===== EXPORT ===== */
function exportDocx() {
    let html = `
    <html><body>${quill.root.innerHTML}</body></html>`;
    let blob = htmlDocx.asBlob(html);
    saveAs(blob, "document.docx");
}
</script>

</body>
</html>
